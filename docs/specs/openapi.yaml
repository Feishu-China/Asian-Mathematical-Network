openapi: 3.0.3
info:
  title: Asiamath API
  description: OpenAPI Specification for Asiamath v4.0-Optimized based on models.ts.
  version: 1.0.0

servers:
  - url: /api/v1
    description: Current API version (V1)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # --- Enums ---
    UserStatus:
      type: string
      enum: [active, inactive, suspended]
    UserRole:
      type: string
      enum: [applicant, reviewer, organizer, admin]
    ProfileVerificationStatus:
      type: string
      enum: [unverified, pending_review, verified, rejected]
    CareerStage:
      type: string
      enum: [undergraduate, masters, phd, postdoc, faculty, other]
    ConferenceStatus:
      type: string
      enum: [draft, published, closed]
    GrantOpportunityStatus:
      type: string
      enum: [draft, published, closed]
    GrantType:
      type: string
      enum: [conference_travel_grant]
    ApplicationType:
      type: string
      enum: [conference_application, grant_application]
    ApplicationStatus:
      type: string
      enum: [draft, submitted, under_review, decided]
    DecisionFinalStatus:
      type: string
      enum: [accepted, rejected, waitlisted]
    DecisionReleaseStatus:
      type: string
      enum: [unreleased, released]

    # --- Models ---
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        status:
          $ref: '#/components/schemas/UserStatus'
        emailVerifiedAt:
          type: string
          format: date-time
          nullable: true
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, email, status, createdAt, updatedAt]

    Profile:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        slug:
          type: string
        fullName:
          type: string
        title:
          type: string
          nullable: true
        institutionId:
          type: string
          format: uuid
          nullable: true
        institutionNameRaw:
          type: string
          nullable: true
        countryCode:
          type: string
          nullable: true
        careerStage:
          $ref: '#/components/schemas/CareerStage'
        bio:
          type: string
          nullable: true
        personalWebsite:
          type: string
          nullable: true
        researchKeywords:
          type: array
          items:
            type: string
        orcidId:
          type: string
          nullable: true
        coiDeclarationText:
          type: string
        isProfilePublic:
          type: boolean
        verificationStatus:
          $ref: '#/components/schemas/ProfileVerificationStatus'
        verifiedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Conference:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        title:
          type: string
        shortName:
          type: string
          nullable: true
        locationText:
          type: string
          nullable: true
        startDate:
          type: string
          format: date
          nullable: true
        endDate:
          type: string
          format: date
          nullable: true
        description:
          type: string
          nullable: true
        applicationDeadline:
          type: string
          format: date-time
          nullable: true
        status:
          $ref: '#/components/schemas/ConferenceStatus'
        applicationFormSchemaJson:
          type: object
        settingsJson:
          type: object
        publishedAt:
          type: string
          format: date-time
          nullable: true
        closedAt:
          type: string
          format: date-time
          nullable: true
        createdByUserId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    GrantOpportunity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        title:
          type: string
        grant_type:
          $ref: '#/components/schemas/GrantType'
        linked_conference_id:
          type: string
          format: uuid
        description:
          type: string
          nullable: true
        eligibility_summary:
          type: string
          nullable: true
        coverage_summary:
          type: string
          nullable: true
        application_deadline:
          type: string
          format: date-time
          nullable: true
        status:
          $ref: '#/components/schemas/GrantOpportunityStatus'
        report_required:
          type: boolean
        published_at:
          type: string
          format: date-time
          nullable: true
        is_application_open:
          type: boolean

    GrantApplicationPayload:
      type: object
      required:
        - linked_conference_application_id
        - statement
        - travel_plan_summary
        - funding_need_summary
      properties:
        linked_conference_application_id:
          type: string
          format: uuid
        statement:
          type: string
        travel_plan_summary:
          type: string
        funding_need_summary:
          type: string
        extra_answers:
          type: object
        file_ids:
          type: array
          items:
            type: string
            format: uuid

    GrantApplication:
      type: object
      properties:
        id:
          type: string
          format: uuid
        application_type:
          $ref: '#/components/schemas/ApplicationType'
        source_module:
          type: string
        grant_id:
          type: string
          format: uuid
          nullable: true
        grant_title:
          type: string
        linked_conference_id:
          type: string
          format: uuid
          nullable: true
        linked_conference_application_id:
          type: string
          format: uuid
          nullable: true
        applicant_user_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/ApplicationStatus'
        statement:
          type: string
          nullable: true
        travel_plan_summary:
          type: string
          nullable: true
        funding_need_summary:
          type: string
          nullable: true
        extra_answers:
          type: object
        files:
          type: array
          items:
            type: object
        submitted_at:
          type: string
          format: date-time
          nullable: true
        decided_at:
          type: string
          format: date-time
          nullable: true
        decision:
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # --- Payloads ---
    LoginPayload:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    RegisterPayload:
      type: object
      required: [email, password, fullName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        fullName:
          type: string

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        user:
          $ref: '#/components/schemas/User'

security:
  - bearerAuth: []

paths:
  # --- Auth Endpoints ---
  /auth/login:
    post:
      summary: User Login
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginPayload'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Unauthorized
  
  /auth/register:
    post:
      summary: User Registration
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterPayload'
      responses:
        '201':
          description: Successfully registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Bad request (e.g. email already in use)

  /auth/me:
    get:
      summary: Get current logged-in user details
      tags: [Auth]
      responses:
        '200':
          description: User profile and user object
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  profile:
                    $ref: '#/components/schemas/Profile'

  # --- Profile Endpoints ---
  /profiles/me:
    put:
      summary: Update my profile
      tags: [Profile]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                bio:
                  type: string
                careerStage:
                  $ref: '#/components/schemas/CareerStage'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'

  # --- Conference Endpoints ---
  /conferences:
    get:
      summary: List all published conferences
      security: []
      tags: [Conference]
      responses:
        '200':
          description: A list of conferences
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Conference'

  # --- Grant Endpoints ---
  /grants:
    get:
      summary: List all published grants
      security: []
      tags: [Grant]
      responses:
        '200':
          description: A list of grant opportunities
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/GrantOpportunity'

  /grants/{slug}:
    get:
      summary: Get one published grant by slug
      security: []
      tags: [Grant]
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Grant detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      grant:
                        $ref: '#/components/schemas/GrantOpportunity'
        '404':
          description: Grant not found

  /grants/{id}/application-form:
    get:
      summary: Get the application form schema for a published grant
      security: []
      tags: [Grant]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Grant application form schema

  /grants/{id}/applications/me:
    get:
      summary: Get my grant application for a grant
      tags: [Grant]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: My grant application
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      application:
                        $ref: '#/components/schemas/GrantApplication'
        '401':
          description: Unauthorized
        '404':
          description: Application not found

  /grants/{id}/applications:
    post:
      summary: Create my draft grant application
      tags: [Grant]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrantApplicationPayload'
      responses:
        '201':
          description: Draft grant application created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      application:
                        $ref: '#/components/schemas/GrantApplication'
        '401':
          description: Unauthorized
        '409':
          description: Draft already exists
        '422':
          description: Submitted linked conference application is required

  /me/applications/{id}/draft:
    put:
      summary: Update my draft application for either conference or grant subtype
      tags: [Applicant]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/GrantApplicationPayload'
      responses:
        '200':
          description: Draft updated
        '401':
          description: Unauthorized
        '404':
          description: Application not found
        '409':
          description: Only draft applications can be edited
        '422':
          description: Submitted linked conference application is required

  /me/applications/{id}/submit:
    post:
      summary: Submit my draft application for either conference or grant subtype
      tags: [Applicant]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Draft submitted
        '401':
          description: Unauthorized
        '404':
          description: Application not found
        '409':
          description: Only draft applications can be submitted
        '422':
          description: Profile or prerequisite validation failed
