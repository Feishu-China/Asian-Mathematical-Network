name: CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Monorepo
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: asiamath_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d asiamath_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/asiamath_test?schema=public

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared workspace
        run: npm run build:shared

      - name: Build backend
        run: npm run build:backend

      - name: Build frontend
        run: npm run build:frontend

      - name: Verify workspace and runtime contracts
        run: npm run test:workspace-config

      - name: Run frontend test suite
        run: npm run test:run --workspace frontend

      - name: Run backend test suite
        run: npm run test:backend
